<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Midsummer Gala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; max-width: 100vw; }
    html, body { width: 100%; }
    :root {
      --bg:      #f4f0e8;
      --bg2:     #ffffff;
      --bg3:     #ffffff;
      --bg4:     #ede8dc;
      --gold:    #9a7235;
      --gold-lt: #b89050;
      --gold-dk: #6b4e1f;
      --cream:   #241a25;
      --muted:   #7a6e6a;
      --red:     #c0392b;
      --green:   #27795a;
      --blue:    #2c5282;
      --radius:  10px;
      --hairline: rgba(36,26,37,0.1);
    }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      display: flex; flex-direction: column;
      min-height: 100vh;
      max-width: 100vw;
    }

    /* ── LOGIN ──────────────────────────────────────────────── */
    #login-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--bg3);
      border: 1px solid rgba(154,114,53,.25);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 360px; text-align: center;
      box-shadow: 0 4px 24px rgba(36,26,37,.08);
    }
    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300;
      color: var(--gold); margin-bottom: .3rem;
    }
    .login-card p { font-size: .8rem; color: var(--muted); margin-bottom: 2rem; }
    .login-card input {
      width: 100%;
      background: var(--bg);
      border: 1px solid rgba(154,114,53,.3);
      border-radius: 8px;
      padding: .8rem 1rem;
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: .9rem;
      text-align: center; letter-spacing: .2em;
      outline: none; margin-bottom: 1rem;
    }
    .login-card input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%;
      background: var(--gold);
      border: none; border-radius: 50px;
      color: #fff;
      padding: .8rem;
      font-family: 'Jost', sans-serif;
      font-size: .8rem; letter-spacing: .2em;
      text-transform: uppercase; cursor: pointer;
      transition: opacity .3s;
    }
    .login-btn:hover { opacity: .85; }
    .login-error {
      color: var(--red); font-size: .8rem;
      margin-top: .75rem; min-height: 1.2em;
    }

    /* ── APP ────────────────────────────────────────────────── */
    #app { display: none; flex: 1; flex-direction: column; }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid rgba(36,26,37,.1);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 8px rgba(36,26,37,.06);
    }
    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; letter-spacing: .2em;
      color: var(--gold); text-transform: uppercase;
    }
    .header-logo span { font-size: .65rem; opacity: .5; margin-left: .75rem; letter-spacing: .1em; }
    .header-actions { display: flex; gap: .75rem; align-items: center; }

    /* ── MAIN ───────────────────────────────────────────────── */
    main { flex: 1; padding: 2rem; width: 100%; }

    /* ── STATS CARDS ────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg3);
      border: 1px solid rgba(36,26,37,.08);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      box-shadow: 0 1px 6px rgba(36,26,37,.05);
    }
    .stat-label {
      font-size: .65rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: .5rem;
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem; font-weight: 300;
      color: var(--gold); line-height: 1;
    }
    .stat-sub { font-size: .75rem; color: var(--muted); margin-top: .25rem; }

    /* ── TOOLBAR ────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center;
      gap: 1rem; margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-tabs {
      display: flex; gap: .5rem;
      background: var(--bg3);
      border: 1px solid rgba(36,26,37,.1);
      border-radius: 50px; padding: .25rem;
    }
    .tab-btn {
      background: transparent; border: none;
      color: var(--muted);
      padding: .4rem 1.2rem;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: .75rem; letter-spacing: .1em;
      text-transform: uppercase; cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: var(--gold);
      color: #fff;
    }
    .search-box {
      flex: 1; min-width: 200px;
      background: var(--bg3);
      border: 1px solid rgba(36,26,37,.12);
      border-radius: 8px;
      padding: .55rem 1rem;
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: .85rem; outline: none;
      transition: border-color .3s;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { border-color: var(--gold); }

    .export-btn {
      background: rgba(154,114,53,.08);
      border: 1px solid rgba(154,114,53,.25);
      color: var(--gold);
      padding: .55rem 1.2rem;
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: .75rem; letter-spacing: .1em;
      text-transform: uppercase; cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .export-btn:hover { background: rgba(154,114,53,.16); }

    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(36,26,37,.15);
      color: var(--muted);
      padding: .55rem .9rem;
      border-radius: 8px;
      cursor: pointer; font-size: .9rem;
      transition: color .2s, border-color .2s;
    }
    .refresh-btn:hover { color: var(--cream); border-color: rgba(36,26,37,.35); }

    /* Navetta toggle */
    .navetta-toggle {
      display: flex; align-items: center; gap: .35rem;
      padding: .5rem 1rem; border-radius: 8px; border: 1px solid;
      font-family: 'Jost', sans-serif; font-size: .72rem;
      letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .navetta-toggle.open {
      background: rgba(39,121,90,.08); border-color: rgba(39,121,90,.3); color: var(--green);
    }
    .navetta-toggle.open:hover { background: rgba(39,121,90,.15); }
    .navetta-toggle.locked {
      background: rgba(192,57,43,.08); border-color: rgba(192,57,43,.3); color: var(--red);
    }
    .navetta-toggle.locked:hover { background: rgba(192,57,43,.15); }
    .navetta-toggle:disabled { opacity: .5; cursor: not-allowed; }

    /* ── TABLE ──────────────────────────────────────────────── */
    .table-wrap {
      background: var(--bg3);
      border: 1px solid rgba(36,26,37,.08);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(36,26,37,.05);
      max-width: 100%;
    }
    .table-count {
      padding: .9rem 1.5rem;
      font-size: .75rem; color: var(--muted);
      border-bottom: 1px solid rgba(36,26,37,.07);
      display: flex; align-items: center; justify-content: space-between;
    }
    .pending-banner {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 1.5rem;
      background: rgba(154,114,53,.12);
      border-bottom: 1px solid rgba(154,114,53,.25);
      font-size: .85rem; color: var(--gold);
      font-weight: 600;
    }
    .pending-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--gold); color: #1a1020;
      border-radius: 10px; font-size: .65rem; font-weight: 700;
      padding: 1px 6px; margin-left: 4px; min-width: 18px;
    }
    .tab-pending.active { color: var(--gold) !important; border-color: var(--gold) !important; }
    .badge-omaggio {
      display: inline-block; font-size: .65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(155,89,182,.15); color: #9b59b6;
      border: 1px solid rgba(155,89,182,.3); margin-left: 4px;
    }
    .action-btn.edit { background: rgba(52,152,219,.1); color: #3498db; border-color: rgba(52,152,219,.3); }
    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: .65rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted);
      padding: .9rem 1.2rem;
      border-bottom: 1px solid rgba(36,26,37,.08);
      background: rgba(36,26,37,.02);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(36,26,37,.05);
      transition: background .2s;
    }
    tbody tr:hover { background: rgba(154,114,53,.04); }
    tbody tr:last-child { border: none; }
    td {
      padding: .85rem 1.2rem;
      font-size: .85rem; vertical-align: middle;
    }
    .td-id { color: var(--muted); font-family: monospace; font-size: .8rem; }
    .td-name { font-weight: 400; }
    .td-email { color: var(--muted); font-size: .8rem; }
    .td-phone { color: var(--muted); font-size: .8rem; }
    .td-date { color: var(--muted); font-size: .78rem; white-space: nowrap; }

    .badge {
      display: inline-block; padding: .2rem .75rem;
      border-radius: 50px; font-size: .7rem;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .badge-standard     { background: rgba(44,82,130,.08); color: #2c5282; border: 1px solid rgba(44,82,130,.2); }
    .badge-navetta      { background: rgba(154,114,53,.1); color: var(--gold); border: 1px solid rgba(154,114,53,.25); }
    .badge-navetta-only { background: rgba(39,121,90,.08); color: var(--green); border: 1px solid rgba(39,121,90,.2); }

    .evento-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .65rem; letter-spacing: .06em; padding: .15rem .5rem;
      border-radius: 50px; font-weight: 500; margin-left: 4px;
    }
    .evento-ok  { background: rgba(39,121,90,.1); color: var(--green); border: 1px solid rgba(39,121,90,.25); }
    .evento-warn { background: rgba(192,57,43,.08); color: var(--red); border: 1px solid rgba(192,57,43,.2); }

    .stato-badge {
      display: inline-block; padding: .2rem .7rem;
      border-radius: 50px; font-size: .68rem;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .stato-confermata  { background: rgba(39,121,90,.1); color: var(--green); border: 1px solid rgba(39,121,90,.25); }
    .stato-in_attesa   { background: rgba(154,114,53,.1); color: var(--gold); border: 1px solid rgba(154,114,53,.2); }
    .stato-annullata   { background: rgba(192,57,43,.08); color: var(--red); border: 1px solid rgba(192,57,43,.2); }

    .actions-cell { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
    .action-btn {
      background: transparent; border: 1px solid rgba(36,26,37,.15);
      color: var(--muted); padding: .3rem .6rem;
      border-radius: 6px; font-size: .7rem; cursor: pointer;
      transition: all .2s;
    }
    .action-btn:hover { color: var(--cream); border-color: rgba(36,26,37,.4); background: rgba(36,26,37,.05); }
    .action-btn.del:hover  { color: var(--red);   border-color: var(--red); background: rgba(192,57,43,.06); }
    .action-btn.confirm    { border-color: rgba(76,175,132,.35); color: var(--green); }
    .action-btn.confirm:hover { background: rgba(76,175,132,.15); border-color: var(--green); }
    .action-btn.reject     { border-color: rgba(224,85,85,.3); color: var(--red); }
    .action-btn.reject:hover  { background: rgba(224,85,85,.12); border-color: var(--red); }
    .action-btn.email      { border-color: rgba(44,82,130,.3); color: var(--blue); }
    .action-btn.email:hover   { background: rgba(44,82,130,.1); border-color: var(--blue); }
    .action-btn.force      { border-color: rgba(154,114,53,.35); color: var(--gold); }
    .action-btn.force:hover   { background: rgba(154,114,53,.12); border-color: var(--gold); }
    .action-btn.checkin    { border-color: rgba(44,82,130,.3); color: var(--blue); font-weight: 500; }
    .action-btn.checkin:hover { background: rgba(44,82,130,.1); border-color: var(--blue); }
    .action-btn.checkin.done  { border-color: rgba(39,121,90,.4); color: var(--green); background: rgba(39,121,90,.08); }
    .action-btn.checkin.done:hover { background: rgba(39,121,90,.18); }

    .checkin-badge { font-size: .7rem; color: var(--green); font-weight: 500; }
    .action-btn:disabled   { opacity: .3; cursor: not-allowed; }

    .pay-badge { font-size: .7rem; letter-spacing: .06em; }
    .pay-paid   { color: var(--green); }
    .pay-wait   { color: var(--gold); }
    .pay-none   { color: var(--muted); }
    .pay-ref    { color: var(--red); }

    .empty-state {
      text-align: center; padding: 4rem 2rem; opacity: .4;
    }
    .empty-state p { font-size: .9rem; margin-top: .5rem; }

    /* ── STATO DROPDOWN ─────────────────────────────────────── */
    .stato-select {
      background: transparent;
      border: none; color: inherit;
      font-family: 'Jost', sans-serif;
      font-size: .68rem; cursor: pointer;
      outline: none;
    }
    .stato-select option { background: var(--bg3); color: var(--cream); }

    /* ── MODAL ──────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(36,26,37,.45); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg3);
      border: 1px solid rgba(36,26,37,.12);
      border-radius: 16px;
      padding: 2rem;
      width: 480px; max-width: 95vw;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(36,26,37,.15);
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-label {
      font-size: .65rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: .4rem; display: block;
    }
    .modal-input, .modal-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid rgba(36,26,37,.15);
      border-radius: 8px;
      padding: .65rem .9rem;
      color: var(--cream);
      font-family: 'Jost', sans-serif; font-size: .85rem;
      outline: none; transition: border-color .2s;
    }
    .modal-input:focus, .modal-select:focus { border-color: var(--gold); }
    .modal-select option { background: #fff; color: #241a25; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .modal-btn {
      padding: .6rem 1.4rem; border-radius: 8px; border: none;
      font-family: 'Jost', sans-serif; font-size: .8rem;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: opacity .2s;
    }
    .modal-btn:hover { opacity: .85; }
    .modal-btn.primary { background: linear-gradient(135deg, var(--gold-dk), var(--gold)); color: var(--bg); }
    .modal-btn.secondary { background: transparent; color: var(--muted); border: 1px solid rgba(36,26,37,.15); }

    /* ── LOADING ────────────────────────────────────────────── */
    .loading { text-align: center; padding: 3rem; opacity: .4; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 2px solid rgba(154,114,53,.2);
      border-top-color: var(--gold);
      border-radius: 50%; animation: spin .8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow-x: hidden; }

      /* Header: logo centrato + azioni su riga separata */
      header {
        flex-direction: column; align-items: center;
        gap: .6rem; padding: .9rem 1.2rem;
      }
      .header-logo {
        font-size: 1rem; text-align: center; width: 100%;
      }
      .header-logo span { display: block; margin-top: 2px; }
      .header-actions {
        display: flex; width: 100%; gap: .5rem; align-items: center;
      }
      .header-actions .btn-export-csv { display: none; }
      /* Nuova prenotazione occupa tutto lo spazio disponibile */
      .header-actions .export-btn {
        flex: 1; font-size: .72rem; padding: .55rem .8rem;
        letter-spacing: .08em; text-align: center;
      }
      .header-actions .action-btn {
        flex-shrink: 0; font-size: .72rem; padding: .55rem .85rem;
        white-space: nowrap;
      }

      /* Stats: 3x2 su mobile */
      .stats-grid { grid-template-columns: 1fr 1fr 1fr !important; gap: .6rem; }
      .stat-card { padding: .9rem 1rem; }
      .stat-value { font-size: 1.8rem; }
      .stat-sub { font-size: .7rem; }

      /* Main con margini laterali */
      main { padding: 1rem 1.2rem; }

      /* Toolbar: filtri + cerca su righe separate */
      .toolbar { flex-direction: column; gap: .6rem; align-items: stretch; }
      .filter-tabs { justify-content: space-between; width: 100%; }
      .tab-btn { flex: 1; text-align: center; padding: .4rem .5rem; font-size: .7rem; }
      .search-box {
        width: 100%; min-width: 0; font-size: .9rem;
        padding: .65rem 1rem; display: block;
      }
      .refresh-btn { display: none; } /* nascosto su mobile, si aggiorna da solo */

      /* Nascondi tabella, mostra cards */
      .table-scroll { display: none; }
      .cards-list { display: flex; flex-direction: column; gap: .7rem; padding: .25rem 0; }

      /* Table count */
      .table-count { padding: .7rem 0; font-size: .78rem; }
    }
    @media (min-width: 769px) {
      .cards-list { display: none; }
    }

    /* ── RESERVATION CARDS (mobile) ─────────────────────────── */
    .res-card {
      background: var(--bg);
      border: 1px solid rgba(36,26,37,.1);
      border-radius: 10px;
      padding: .85rem;
      display: flex; flex-direction: column; gap: .55rem;
      box-sizing: border-box; width: 100%;
    }
    .res-card-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: .5rem;
    }
    .res-card-name {
      font-weight: 500; font-size: .95rem; color: var(--cream);
    }
    .res-card-id { font-size: .72rem; color: var(--muted); font-family: monospace; }
    .res-card-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: .5rem;
      font-size: .8rem; color: var(--muted);
    }
    .res-card-email { font-size: .78rem; color: var(--muted); word-break: break-all; }
    .res-card-actions {
      display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .25rem;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Midsummer Gala</h1>
    <p>Pannello Amministratore</p>
    <input type="password" id="pwd-input" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <span class="header-logo">Midsummer Gala <span>Admin Panel</span></span>
    </div>
    <div class="header-actions">
      <button class="export-btn" onclick="openNewModal()" style="background:rgba(76,175,132,.1);border-color:rgba(76,175,132,.3);color:var(--green);">+ Nuova prenotazione</button>
      <button class="export-btn btn-export-csv" onclick="exportCSV()">⬇ Esporta CSV</button>
      <button class="navetta-toggle open" id="navetta-toggle-btn" onclick="toggleNavetta()" title="Blocca/sblocca vendita biglietti con navetta">🔓 Navetta</button>
      <button class="action-btn" onclick="doLogout()">Esci</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid" id="stats-grid" style="grid-template-columns:repeat(6,1fr);">
      <div class="stat-card">
        <div class="stat-label">✓ Confermate</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card" style="border-left:3px solid #9b59b6;cursor:pointer;" onclick="setFilter('omaggio')" title="Vedi omaggi">
        <div class="stat-label">🎁 Omaggi</div>
        <div class="stat-value" id="stat-omaggi" style="color:#9b59b6;">—</div>
        <div class="stat-sub" id="stat-omaggi-t"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Standard</div>
        <div class="stat-value" id="stat-standard">—</div>
        <div class="stat-sub" id="stat-standard-t"></div>
      </div>
      <div class="stat-card">

    <!-- Toolbar -->
    <div class="toolbar">

    </div>
  </main>
</div>

<script>
let adminKey = '';
let currentFilter = 'all';
let _editId = null;

// ── LOGIN ────────────────────────────────────────────────────────────────────
// Auto-login: controlla URL, poi localStorage
(function () {
  const params = new URLSearchParams(location.search);
  const k = params.get('key') || localStorage.getItem('mgala_key');
  if (k) { adminKey = k; showApp(); }
})();

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  const res = await fetch(`/api/admin/stats?key=${encodeURIComponent(pwd)}`);
  if (res.ok) {
    adminKey = pwd;
    localStorage.setItem('mgala_key', pwd);
    showApp();
  } else {
    document.getElementById('login-error').textContent = 'Password non corretta.';
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  loadAll();
  loadNavettaStatus();
  // Sync pagamenti Stripe in background
  fetch(`/api/admin/sync-payments?key=${encodeURIComponent(adminKey)}`, { method: 'POST' })
    .then(r => r.json())
    .then(d => { if (d.synced > 0) loadReservations(); })
    .catch(() => {});
}

function doLogout() {
  adminKey = '';
  localStorage.removeItem('mgala_key');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── DATA ─────────────────────────────────────────────────────────────────────
function loadAll() {
  loadStats();
  loadReservations();
  // Sync pagamenti in background ad ogni refresh
  fetch(`/api/admin/sync-payments?key=${encodeURIComponent(adminKey)}`, { method: 'POST' })
    .then(r => r.json())
    .then(d => { if (d.synced > 0) { loadStats(); loadReservations(); } })
    .catch(() => {});
}

async function loadStats() {
  try {
    const res  = await fetch(`/api/admin/stats?key=${encodeURIComponent(adminKey)}`);
    const data = await res.json();

    document.getElementById('stat-total').textContent = data.totals.prenotazioni ?? 0;

    const types = { standard: {}, navetta: {}, navetta_only: {} };
    (data.byType || []).forEach(r => { types[r.tipo_biglietto] = r; });

    // Standard
    const vs = types['standard'];
    document.getElementById('stat-standard').textContent   = vs.prenotazioni ?? 0;
    document.getElementById('stat-standard-t').textContent = vs.biglietti_totali ? `${vs.biglietti_totali} biglietti` : '';

    // Con Navetta = navetta + navetta_only
    const vn  = types['navetta'];
    const vno = types['navetta_only'];
    const navTot = (vn.prenotazioni ?? 0) + (vno.prenotazioni ?? 0);
    const navBig = (vn.biglietti_totali ?? 0) + (vno.biglietti_totali ?? 0);
    document.getElementById('stat-navetta').textContent   = navTot;
    document.getElementById('stat-navetta-t').textContent = navBig ? `${navBig} biglietti` : '';

    const omaggi = data.omaggi ?? 0;
    document.getElementById('stat-omaggi').textContent   = omaggi;
    document.getElementById('stat-omaggi-t').textContent = omaggi > 0 ? 'inseriti manualmente' : '';

    const pending = data.pending ?? 0;
    document.getElementById('stat-pending').textContent   = pending;
    document.getElementById('stat-pending-t').textContent = pending > 0 ? 'clicca per vedere' : 'tutto ok';
    const badge = document.getElementById('pending-badge');
    if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
    else { badge.style.display = 'none'; }

    const presenti = data.presenti ?? 0;
    const totConf  = data.totals.prenotazioni ?? 0;
    document.getElementById('stat-presenti').textContent   = presenti;
    document.getElementById('stat-presenti-t').textContent = totConf ? `${presenti} / ${totConf} presenti` : '';
  } catch { /* ignore */ }
}

async function loadReservations() {
  const q = document.getElementById('search-box')?.value.trim() || '';
  let url = `/api/admin/reservations?key=${encodeURIComponent(adminKey)}`;
  if (currentFilter === 'pending') {
    url += `&tipo=all&stato=in_attesa`;
  } else if (currentFilter === 'omaggio') {
    url += `&tipo=all&omaggio=1`;
  } else {
    url += `&tipo=${currentFilter}`;
  }
  if (q) url += `&q=${encodeURIComponent(q)}`;

  // Mostra/nascondi banner pending
  const banner = document.getElementById('pending-banner');
  const bannerTxt = document.getElementById('pending-banner-txt');
  if (currentFilter === 'pending') {
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }

  const tbody = document.getElementById('table-body');
  try {
    const res  = await fetch(url);
    const rows = await res.json();
    renderTable(rows);
  } catch {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;opacity:.4;">Errore nel caricamento.</td></tr>';
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  const count = document.getElementById('table-count');
  const bannerTxt = document.getElementById('pending-banner-txt');

  if (currentFilter === 'pending') {
    count.textContent = `${rows.length} prenotazion${rows.length === 1 ? 'e' : 'i'} in attesa`;
    if (bannerTxt) bannerTxt.textContent = `⏳ ${rows.length} prenotazion${rows.length === 1 ? 'e' : 'i'} in attesa di conferma`;
    const confirmAllBtn = document.getElementById('confirm-all-btn');
    if (confirmAllBtn) confirmAllBtn.style.display = rows.length > 0 ? '' : 'none';
  } else {
    count.textContent = `${rows.length} prenotazion${rows.length === 1 ? 'e' : 'i'}`;
  }

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state">
      <div style="font-size:2rem">🌙</div>
      <p>Nessuna prenotazione trovata.</p>
    </div></td></tr>`;
    return;
  }

  const typeBadge = (t, r) => {
    const m = { standard: 'badge-standard', navetta: 'badge-navetta', navetta_only: 'badge-navetta-only' };
    const l = { standard: 'Standard', navetta: 'Con Navetta', navetta_only: 'Solo Navetta' };
    let badge = `<span class="badge ${m[t] || ''}">${l[t] || t}</span>`;
    if (t === 'navetta_only') {
      if (r.ha_biglietto_evento >= 1) {
        badge += `<span class="evento-badge evento-ok">✓ ha standard</span>`;
      } else {
        badge += `<span class="evento-badge evento-warn">⚠ senza evento</span>`;
      }
    }
    if (r.omaggio) badge += `<span class="badge-omaggio">🎁 omaggio</span>`;
    return badge;
  };

  const statoBadge = s => {
    const l = { confermata: 'Confermata', in_attesa: 'In attesa', annullata: 'Annullata' };
    return `<select class="stato-badge stato-${s} stato-select"
      onchange="updateStato(${rows.find(r => r.stato === s)?.id ?? 0}, this)"
      data-current="${s}">
      <option value="confermata" ${s==='confermata'?'selected':''}>Confermata</option>
      <option value="in_attesa"  ${s==='in_attesa' ?'selected':''}>In attesa</option>
      <option value="annullata"  ${s==='annullata' ?'selected':''}>Annullata</option>
    </select>`;
  };

  const fmtDate = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
  };

  const payBadge = r => {
    if (r.stato === 'annullata' && r.payment_intent_id)
      return `<span class="pay-badge pay-ref">↩ Rimborsato</span>`;
    if (r.stato === 'annullata')
      return `<span class="pay-badge pay-none">— Annullata</span>`;
    if (r.stripe_payment_status === 'paid')
      return `<span class="pay-badge pay-paid">✓ Pagato</span>`;
    if (r.stripe_payment_status === 'unpaid' && r.stripe_session_id)
      return `<span class="pay-badge pay-wait">⏳ In attesa</span>`;
    if (r.stripe_session_id)
      return `<span class="pay-badge pay-wait">⏳ Verifica…</span>`;
    return `<span class="pay-badge pay-none">—</span>`;
  };

  const actionsBtns = r => {
    if (r.stato === 'annullata') return `<button class="action-btn del" onclick="deleteRow(${r.id})" title="Elimina">🗑</button>`;
    const confirmBtn = r.stato !== 'confermata'
      ? `<button class="action-btn confirm" onclick="confirmRes(${r.id})" title="Conferma e invia email">✓ Conferma</button>`
      : `<button class="action-btn confirm" disabled>✓ Confermata</button>`;
    const forceBtn = r.stato !== 'confermata'
      ? `<button class="action-btn force" onclick="forceConfirm(${r.id})" title="Forza conferma (bypass Stripe)">⚡</button>`
      : '';
    const checkinBtn = r.stato === 'confermata'
      ? r.checked_in
        ? `<button class="action-btn checkin done" onclick="toggleCheckin(${r.id})" title="Presente — clicca per annullare">✓ Presente</button>`
        : `<button class="action-btn checkin" onclick="toggleCheckin(${r.id})" title="Segna come arrivato">Check-in</button>`
      : '';
    const rejectBtn = `<button class="action-btn reject" onclick="rejectRes(${r.id})" title="Rifiuta e rimborsa">✕ Rifiuta</button>`;
    const emailBtn  = `<button class="action-btn email" onclick="resendEmail(${r.id})" title="Reinvia email di conferma">✉</button>`;
    const delBtn    = `<button class="action-btn del" onclick="deleteRow(${r.id})" title="Elimina">🗑</button>`;
    const editBtn = `<button class="action-btn edit" onclick="openEditModal(${r.id})" title="Modifica prenotazione">✎ Modifica</button>`;
    return checkinBtn + confirmBtn + forceBtn + rejectBtn + emailBtn + editBtn + delBtn;
  };

  tbody.innerHTML = rows.map(r => `
    <tr id="row-${r.id}">
      <td class="td-id">#${String(r.id).padStart(4,'0')}</td>
      <td class="td-name">${esc(r.nome)} ${esc(r.cognome)}</td>
      <td class="td-email">${esc(r.email)}</td>
      <td style="text-align:center;font-size:.8rem;">${r.sesso || '—'}</td>
      <td class="td-phone">${esc(r.telefono || '—')}</td>
      <td>${typeBadge(r.tipo_biglietto, r)}</td>
      <td>${payBadge(r)}</td>
      <td><span class="stato-badge stato-${r.stato}">${
        {confermata:'✓ Confermata', in_attesa:'⏳ In attesa', annullata:'✕ Annullata'}[r.stato] || r.stato
      }</span></td>
      <td class="td-email" style="max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
          title="${esc(r.note || '')}">${esc(r.note || '—')}</td>
      <td class="td-date">${fmtDate(r.created_at)}</td>
      <td><div class="actions-cell">${actionsBtns(r)}</div></td>
    </tr>
  `).join('');

  // Mobile cards
  const cardsList = document.getElementById('cards-list');
  if (!rows.length) {
    cardsList.innerHTML = `<div style="text-align:center;padding:3rem;opacity:.4;"><div style="font-size:2rem">🌙</div><p>Nessuna prenotazione.</p></div>`;
    return;
  }
  cardsList.innerHTML = rows.map(r => `
    <div class="res-card" id="card-${r.id}">
      <div class="res-card-top">
        <div>
          <div class="res-card-name">${esc(r.nome)} ${esc(r.cognome)}</div>
          <div class="res-card-id">#${String(r.id).padStart(4,'0')} · ${fmtDate(r.created_at)}</div>
        </div>
        ${typeBadge(r.tipo_biglietto, r)}
      </div>
      <div class="res-card-email">${esc(r.email)}${r.telefono ? ' · ' + esc(r.telefono) : ''}</div>
      <div class="res-card-row">
        ${payBadge(r)}
        <span class="stato-badge stato-${r.stato}">${
          {confermata:'✓ Confermata', in_attesa:'⏳ In attesa', annullata:'✕ Annullata'}[r.stato] || r.stato
        }</span>
      </div>
      ${r.note ? `<div style="font-size:.75rem;color:var(--muted);font-style:italic;">${esc(r.note)}</div>` : ''}
      <div class="res-card-actions">${actionsBtns(r)}</div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(type) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === type));
  loadReservations();
}

// ── EDIT RESERVATION ─────────────────────────────────────────────────────────
function openEditModal(id) {
  const row = document.getElementById(`row-${id}`);
  // Fetch fresh data from the already-loaded reservation list
  fetch(`/api/admin/reservations?key=${encodeURIComponent(adminKey)}&q=${id}`)
    .then(r => r.json())
    .then(rows => {
      const r = rows.find(x => x.id === id);
      if (!r) return showToast('Prenotazione non trovata', 'red');
      _editId = id;
      document.getElementById('edit-modal-ref').textContent = `#${String(id).padStart(4,'0')}`;
      document.getElementById('e-nome').value     = r.nome || '';
      document.getElementById('e-cognome').value  = r.cognome || '';
      document.getElementById('e-email').value    = r.email || '';
      document.getElementById('e-telefono').value = r.telefono || '';
      document.getElementById('e-sesso').value    = r.sesso || '';
      document.getElementById('e-tipo').value     = r.tipo_biglietto || 'standard';
      document.getElementById('e-stato').value    = r.stato || 'confermata';
      document.getElementById('e-note').value     = r.note || '';
      document.getElementById('e-omaggio').checked = !!r.omaggio;
      document.getElementById('edit-modal').classList.add('open');
    })
    .catch(() => showToast('Errore nel caricamento', 'red'));
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  _editId = null;
}

async function submitEdit() {
  if (!_editId) return;
  const nome     = document.getElementById('e-nome').value.trim();
  const cognome  = document.getElementById('e-cognome').value.trim();
  const email    = document.getElementById('e-email').value.trim();
  if (!nome || !cognome || !email) {
    showToast('✗ Nome, cognome e email sono obbligatori.', 'red'); return;
  }
  const btn = document.querySelector('#edit-modal .modal-btn.primary');
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  const res = await fetch(`/api/admin/reservations/${_editId}?key=${encodeURIComponent(adminKey)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nome, cognome, email,
      telefono:      document.getElementById('e-telefono').value.trim(),
      sesso:         document.getElementById('e-sesso').value || null,
      tipo_biglietto: document.getElementById('e-tipo').value,
      stato:         document.getElementById('e-stato').value,
      note:          document.getElementById('e-note').value.trim(),
      omaggio:       document.getElementById('e-omaggio').checked,
    })
  });
  btn.disabled = false; btn.textContent = 'Salva modifiche';
  if (res.ok) {
    closeEditModal();
    showToast('✓ Prenotazione aggiornata!', 'green');
    loadAll();
  } else {
    const d = await res.json();
    showToast('✗ ' + d.error, 'red');
  }
}

// ── CONFIRM ALL PENDING ───────────────────────────────────────────────────────
async function confirmAll() {
  const rows = document.querySelectorAll('#table-body tr[id^="row-"]');
  if (!rows.length) return;
  if (!confirm(`Confermare tutte le ${rows.length} prenotazioni in attesa?\nVerrà inviata l'email di conferma a ciascun ospite.`)) return;
  const btn = document.getElementById('confirm-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  let ok = 0, fail = 0;
  for (const row of rows) {
    const id = row.id.replace('row-', '');
    try {
      const r = await fetch(`/api/admin/confirm/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
      if (r.ok) ok++; else fail++;
    } catch { fail++; }
  }
  showToast(`✓ ${ok} confermate${fail ? ', ' + fail + ' errori' : ''}`, ok > 0 ? 'green' : 'red');
  loadAll();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
async function confirmRes(id) {
  if (!confirm(`Confermare la prenotazione #${String(id).padStart(4,'0')}?\nVerrà inviata automaticamente l'email di conferma al cliente.`)) return;
  const btn = document.querySelector(`#row-${id} .action-btn.confirm`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const res  = await fetch(`/api/admin/confirm/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    showToast('✓ Prenotazione confermata e email inviata!', 'green');
    loadAll();
  } else {
    showToast('✗ ' + data.error, 'red');
    if (btn) { btn.disabled = false; btn.textContent = '✓ Conferma'; }
  }
}

async function rejectRes(id) {
  if (!confirm(`Rifiutare la prenotazione #${String(id).padStart(4,'0')}?\nSe il pagamento è stato ricevuto verrà emesso un rimborso automatico su Stripe.`)) return;
  const btn = document.querySelector(`#row-${id} .action-btn.reject`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const res  = await fetch(`/api/admin/reject/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    const msg = data.refund_id
      ? `✓ Prenotazione annullata. Rimborso Stripe emesso: ${data.refund_id}`
      : data.refund_error
        ? `✓ Annullata. ⚠ Rimborso: ${data.refund_error}`
        : '✓ Prenotazione annullata (nessun pagamento da rimborsare).';
    showToast(msg, data.refund_error ? 'gold' : 'green');
    loadAll();
  } else {
    showToast('✗ ' + data.error, 'red');
    if (btn) { btn.disabled = false; btn.textContent = '✕ Rifiuta'; }
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'green') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:.75rem 1.5rem;border-radius:8px;font-size:.85rem;font-family:Jost,sans-serif;z-index:999;max-width:90vw;text-align:center;transition:opacity .4s;';
    document.body.appendChild(t);
  }
  const colors = { green: '#0b1a10', red: '#1a0b0b', gold: '#1a1500' };
  const borders = { green: '#4caf84', red: '#e05555', gold: '#c9a84c' };
  t.style.background  = colors[type]  || colors.green;
  t.style.border      = `1px solid ${borders[type] || borders.green}`;
  t.style.color       = borders[type] || borders.green;
  t.style.opacity     = '1';
  t.textContent       = msg;
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.style.opacity = '0'; }, 4000);
}

async function toggleCheckin(id) {
  const res  = await fetch(`/api/admin/checkin/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    const msg = data.checked_in ? '✓ Check-in effettuato!' : 'Check-in annullato.';
    showToast(msg, data.checked_in ? 'green' : 'gold');
    loadAll();
  } else {
    showToast('✗ ' + data.error, 'red');
  }
}

async function forceConfirm(id) {
  if (!confirm(`Forzare la conferma della prenotazione #${String(id).padStart(4,'0')} senza controllo Stripe?\nUsare solo se il pagamento è stato verificato manualmente.`)) return;
  const btn = document.querySelector(`#row-${id} .action-btn.force`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const res  = await fetch(`/api/admin/confirm/${id}?key=${encodeURIComponent(adminKey)}&force=1`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    showToast('⚡ Prenotazione forzata e confermata — email inviata!', 'green');
    loadAll();
  } else {
    showToast('✗ ' + data.error, 'red');
    if (btn) { btn.disabled = false; btn.textContent = '⚡'; }
  }
}

async function resendEmail(id) {
  const btn = document.querySelector(`#row-${id} .action-btn.email`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const res  = await fetch(`/api/admin/send-confirmation/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    showToast('✉ Email di conferma inviata!', 'green');
  } else {
    showToast('✗ ' + data.error, 'red');
  }
  if (btn) { btn.disabled = false; btn.textContent = '✉'; }

async function deleteRow(id) {
  if (!confirm(`Eliminare la prenotazione #${String(id).padStart(4,'0')}? L'azione è irreversibile.`)) return;
  await fetch(`/api/admin/reservations/${id}?key=${encodeURIComponent(adminKey)}`, { method: 'DELETE' });

}

function exportCSV() {
  const url = `/api/admin/export?key=${encodeURIComponent(adminKey)}&tipo=${currentFilter}`;
  window.open(url, '_blank');
}

// ── NUOVA PRENOTAZIONE ────────────────────────────────────────────────────────
function openNewModal() {
  document.getElementById('m-nome').value = '';
  document.getElementById('m-cognome').value = '';
  document.getElementById('m-email').value = '';
  document.getElementById('m-telefono').value = '';
  document.getElementById('m-sesso').value = '';
  document.getElementById('m-tipo').value = 'standard';
  document.getElementById('m-stato').value = 'confermata';
  document.getElementById('m-note').value = '';
  document.getElementById('m-send-email').checked = true;
  document.getElementById('new-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-nome').focus(), 100);
}

function closeNewModal() {
  document.getElementById('new-modal').classList.remove('open');
}

// ── NAVETTA TOGGLE ────────────────────────────────────────────────────────────
let navettaOpen = true;

async function loadNavettaStatus() {
  try {
    const res  = await fetch(`/api/admin/navetta-status?key=${encodeURIComponent(adminKey)}`);
    const data = await res.json();
    navettaOpen = data.navetta_open;
    updateNavettaBtn();
  } catch {}
}

function updateNavettaBtn() {
  const btn = document.getElementById('navetta-toggle-btn');
  if (!btn) return;
  if (navettaOpen) {
    btn.textContent = '🔓 Navetta';
    btn.className   = 'navetta-toggle open';
    btn.title       = 'Navetta APERTA — clicca per bloccare le vendite';
  } else {
    btn.textContent = '🔒 Navetta';
    btn.className   = 'navetta-toggle locked';
    btn.title       = 'Navetta BLOCCATA — clicca per riaprire le vendite';
  }
}

async function toggleNavetta() {
  const azione = navettaOpen ? 'bloccare' : 'sbloccare';
  if (!confirm(`Vuoi ${azione} la vendita dei biglietti con navetta?`)) return;
  const btn = document.getElementById('navetta-toggle-btn');
  if (btn) btn.disabled = true;
  const res  = await fetch(`/api/admin/navetta-toggle?key=${encodeURIComponent(adminKey)}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    navettaOpen = data.navetta_open;
    updateNavettaBtn();
    showToast(navettaOpen ? '🔓 Vendita navetta riaperta!' : '🔒 Vendita navetta bloccata.', navettaOpen ? 'green' : 'gold');
  } else {
    showToast('✗ ' + data.error, 'red');
  }
  if (btn) btn.disabled = false;
}

async function submitNewReservation() {
  const nome     = document.getElementById('m-nome').value.trim();
  const cognome  = document.getElementById('m-cognome').value.trim();
  const email    = document.getElementById('m-email').value.trim();
  const telefono = document.getElementById('m-telefono').value.trim();
  const sesso    = document.getElementById('m-sesso').value;
  const tipo     = document.getElementById('m-tipo').value;
  const stato    = document.getElementById('m-stato').value;
  const note     = document.getElementById('m-note').value.trim();
  const sendEmail = document.getElementById('m-send-email').checked;

  if (!nome || !cognome || !email) {
    showToast('✗ Nome, cognome e email sono obbligatori.', 'red'); return;
  }

  const btn = document.querySelector('#new-modal .modal-btn.primary');
  btn.disabled = true; btn.textContent = 'Salvataggio…';

  const res = await fetch(`/api/admin/reservations/manual?key=${encodeURIComponent(adminKey)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome, cognome, email, telefono, tipo_biglietto: tipo, stato, note, sesso: sesso || null, send_email: sendEmail })
  });
  const data = await res.json();

  btn.disabled = false; btn.textContent = 'Salva prenotazione';

  if (res.ok) {
    closeNewModal();
    showToast('✓ Prenotazione inserita' + (sendEmail && stato === 'confermata' ? ' ed email inviata!' : '!'), 'green');
    loadAll();
  } else {
    showToast('✗ ' + data.error, 'red');
  }
}
